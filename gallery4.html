    <style>
      .gallery-buttons {
        display: flex;
        justify-content: center;
        gap: 70px;
        margin: 40px 0;
      }

      .image-button {
        text-align: center;
        position: relative;
      }

      .image-label-wrapper {
        position: relative;
        display: inline-block;
      }

      .image-label-wrapper img {
        display: block;
        width: 170px;
        height: auto;
        object-fit: contain;
      }

      .label {
        display: block;
        position: static;
        transform: none;
        background-color: transparent;
        color: #2d2d27;
        font-size: 14px;
        padding: 4px 0;
        margin-top: 6px;
        text-align: center;
        pointer-events: none;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin: 40px 0;
      }

      .gallery-item {
        position: relative;
      }

      .gallery-item img {
        width: 100%;
        height: auto;
        object-fit: cover;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .gallery-item img:hover {
        transform: scale(1.03);
      }

      .gallery-item p {
        margin-top: 8px;
        font-size: 14px;
        color: #555;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        /* Flexbox centering — fixes the bottom-alignment issue */
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        display: block;
        max-width: 80%;
        max-height: 80vh;
        object-fit: contain;
      }

      .caption {
        text-align: center;
        color: white;
        padding: 12px 0 0;
        font-size: 14px;
        min-height: 24px;
      }

      .close {
        position: fixed;
        top: 15px;
        right: 35px;
        color: #f1f1f1;
        font-size: 40px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
        line-height: 1;
        user-select: none;
      }

      .close:hover {
        color: #bbb;
      }

      /* Arrow buttons */
      .modal-arrow {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: white;
        font-size: 36px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        user-select: none;
        line-height: 1;
      }

      .modal-arrow:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .modal-arrow.prev {
        left: 20px;
      }

      .modal-arrow.next {
        right: 20px;
      }
    </style>
