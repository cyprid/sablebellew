<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilverGarden</title>
    <link rel="stylesheet" href="style.css" />
    <style>
           body {
        background-image: url('https://cdn.glitch.global/cab32a10-c938-4b3f-b2cf-bbcc3f9d5148/IMG0095%20(2).jpg?v=1747340772615');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        /* Add a semi-transparent overlay to improve readability */
        background-color: rgba(255, 255, 255, 0.258);
        background-blend-mode: overlay;
      }
      .gallery-buttons {
        display: flex;
        justify-content: center;
        gap: 70px;
        margin: 40px 0;
      }

      .image-button {
        text-align: center;
        position: relative;
      }

      .image-label-wrapper {
        position: relative;
        display: inline-block;
      }

      .image-label-wrapper img {
        display: block;
        width: 170px;
        height: auto;
        object-fit: contain;
      }

.label {
  display: block;
  position: static;
  transform: none;
  background-color: transparent;
  color: #2d2d27;
  font-size: 14px;
  padding: 4px 0;
  margin-top: 6px;
  text-align: center;
  pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
   <p><a href="mailto:sablebellew@gmail.com">email</a></p>
        <a href="#">CV</a>
        <a href="resume.html">resume</a>
        <a href="#">about</a>
      </nav>
    </header>
    <div class="header">
      <h1>Sable Bellew</h1>
      
   
         
      </p>
    </div>

    <main>
      <div class="gallery-buttons">
        <div class="image-button">
          <a href="gallery1.html">
            <div class="image-label-wrapper">
              <span class="label">Jewelery</span>
              <img
                src="images/4star2.png"
                alt="Gallery 1"
                data-default="images/4star2.png"
                data-hover="images/4star1.png"
              />
            </div>
          </a>
        </div>

        <div class="image-button">
          <a href="gallery2.html">
            <div class="image-label-wrapper">
              <span class="label">Illustration</span>
              <img
                src="images/4wrench2.png"
                alt="Gallery 2"
                data-default="images/4wrench2.png"
                data-hover="images/4wrenchtransparent.png"
              />
            </div>
          </a>
        </div>

        <div class="image-button">
          <a href="gallery3.html">
            <div class="image-label-wrapper">
              <span class="label">Research</span>
              <img
                src="images/4vice1.png"
                alt="Gallery 3"
                data-default="images/4vice1.png"
                data-hover="images/4vice2.png"
              />
            </div>
          </a>
        </div>

        <div class="image-button">
          <a href="gallery4.html">
            <div class="image-label-wrapper">
              <span class="label">Deuterostome</span>
              <img
                src="images/4bucket1.png"
                alt="Gallery 4"
                data-default="images/4bucket1.png"
                data-hover="images/4bucket2.png"
              />
            </div>
          </a>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".image-button img").forEach((img) => {
          const defaultSrc = img.dataset.default;
          const hoverSrc = img.dataset.hover;

          img.addEventListener("mouseover", () => {
            img.src = hoverSrc;
          });

          img.addEventListener("mouseout", () => {
            img.src = defaultSrc;
          });
        });
      });
    </script>
  </body>
</html>
